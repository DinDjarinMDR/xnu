name: Build XNU Kernel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    env:
      SDKROOT: /Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk
      ARCH_CONFIGS: X86_64
      KERNEL_CONFIGS: DEVELOPMENT
      DSTROOT: /tmp/xnu-dst

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          brew install cmake
          brew install cctools

      - name: Configure build flags
        run: |
          export EXTRA_CFLAGS="-DKERNEL_STACK_MULTIPLIER=2"
          export CFLAGS_DEVELOPMENTX86_64="-O0 -g -DKERNEL_STACK_MULTIPLIER=2"
          export CXXFLAGS_DEVELOPMENTX86_64="-O0 -g -DKERNEL_STACK_MULTIPLIER=2"
      
      - name: Build XNU kernel
        run: |
          make SDKROOT=${SDKROOT} ARCH_CONFIGS=${ARCH_CONFIGS} KERNEL_CONFIGS=${KERNEL_CONFIGS} MAKEJOBS=-j4

      - name: Install kernel
        run: |
          make install_kernels DSTROOT=${DSTROOT}
      
      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xnu-kernel
          path: ${{ env.DSTROOT }}
